services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev-builder
    command: "sleep infinity"
    volumes:
      - ./backend:/app
      - /app/.venv
    ports:
      - "5050:5050"
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    command: "sleep infinity"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"